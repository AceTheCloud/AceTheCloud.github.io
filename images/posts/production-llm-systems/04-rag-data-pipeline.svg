<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">RAG data pipeline</title>
  <desc id="desc">A production RAG pipeline ingests sources, preserves metadata and ACLs, chunks documents, embeds and indexes content, retrieves with hybrid search, reranks, and packs context for generation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1280" height="720" rx="28" fill="url(#bg)"/>
  <text x="70" y="80" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#0f172a">RAG is a data pipeline</text>
  <text x="70" y="120" font-family="Inter, Arial, sans-serif" font-size="21" fill="#475569">Good answers require evidence freshness, permissions, retrieval quality, and context packing.</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="55" y="205" width="150" height="92" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="130" y="241" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">Sources</text>
    <text x="130" y="269" text-anchor="middle" font-size="14" fill="#64748b">PDF, DB, web</text>
    <rect x="245" y="205" width="150" height="92" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="320" y="241" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">Ingest</text>
    <text x="320" y="269" text-anchor="middle" font-size="14" fill="#64748b">ACLs, ids</text>
    <rect x="435" y="205" width="150" height="92" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="510" y="241" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">Chunk</text>
    <text x="510" y="269" text-anchor="middle" font-size="14" fill="#64748b">parent + child</text>
    <rect x="625" y="205" width="150" height="92" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="700" y="241" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">Embed</text>
    <text x="700" y="269" text-anchor="middle" font-size="14" fill="#64748b">versioned</text>
    <rect x="815" y="205" width="150" height="92" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="890" y="241" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">Index</text>
    <text x="890" y="269" text-anchor="middle" font-size="14" fill="#64748b">vector + BM25</text>
    <rect x="1005" y="205" width="200" height="92" rx="16" fill="#0f172a"/>
    <text x="1105" y="241" text-anchor="middle" font-size="22" font-weight="800" fill="#ffffff">Retrieve</text>
    <text x="1105" y="269" text-anchor="middle" font-size="14" fill="#cbd5e1">filter, fuse, rerank</text>
  </g>

  <path d="M207 251 H237" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M397 251 H427" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M587 251 H617" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M777 251 H807" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M967 251 H997" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="150" y="405" width="300" height="120" rx="18" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
  <text x="300" y="448" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#0f172a">Document identity</text>
  <text x="300" y="480" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">source id, version, ACL, timestamp</text>

  <rect x="500" y="405" width="280" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="640" y="448" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#0f172a">Hybrid ranking</text>
  <text x="640" y="480" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">dense + sparse + reranker</text>

  <rect x="830" y="405" width="300" height="120" rx="18" fill="#ffffff" stroke="#fde68a" stroke-width="2"/>
  <text x="980" y="448" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#0f172a">Context packing</text>
  <text x="980" y="480" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">small retrieval, large evidence</text>

  <path d="M1105 298 V360 H980 V397" stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <text x="640" y="620" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="19" fill="#334155">Changing embeddings changes the schema. Plan blue/green index swaps.</text>
</svg>
