<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 540" role="img" aria-labelledby="title desc">
  <title id="title">Tool authorization flow</title>
  <desc id="desc">Tool calls should pass through schema validation, tenant authorization, idempotency, risk checks, execution, audit logging, and response filtering.</desc>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M1 1 L11 6 L1 11 Z" fill="#334155"/></marker></defs>
  <rect width="1280" height="540" rx="28" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#0f172a">Tool calls need an authorization path</text>
  <text x="70" y="110" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">A model suggestion is not permission to mutate external state.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="55" y="225" width="160" height="82" rx="15" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="135" y="257" text-anchor="middle" font-size="19" font-weight="800" fill="#0f172a">Tool request</text><text x="135" y="283" text-anchor="middle" font-size="13" fill="#64748b">name + args</text>
    <rect x="270" y="225" width="160" height="82" rx="15" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/><text x="350" y="257" text-anchor="middle" font-size="19" font-weight="800" fill="#0f172a">Schema</text><text x="350" y="283" text-anchor="middle" font-size="13" fill="#64748b">types, limits</text>
    <rect x="485" y="225" width="160" height="82" rx="15" fill="#0f172a"/><text x="565" y="257" text-anchor="middle" font-size="19" font-weight="800" fill="#ffffff">RBAC</text><text x="565" y="283" text-anchor="middle" font-size="13" fill="#cbd5e1">tenant scope</text>
    <rect x="700" y="225" width="160" height="82" rx="15" fill="#ffffff" stroke="#fde68a" stroke-width="2"/><text x="780" y="257" text-anchor="middle" font-size="19" font-weight="800" fill="#0f172a">Risk check</text><text x="780" y="283" text-anchor="middle" font-size="13" fill="#64748b">approval gate</text>
    <rect x="915" y="225" width="160" height="82" rx="15" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/><text x="995" y="257" text-anchor="middle" font-size="19" font-weight="800" fill="#0f172a">Execute</text><text x="995" y="283" text-anchor="middle" font-size="13" fill="#64748b">idempotent</text>
  </g>
  <path d="M217 266 H262" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/><path d="M432 266 H477" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/><path d="M647 266 H692" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/><path d="M862 266 H907" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="310" y="395" width="660" height="56" rx="14" fill="#0f172a"/>
  <text x="640" y="430" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" fill="#f8fafc">audit log: who, tenant, tool, arguments, result, latency, approval</text>
</svg>
