<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 540" role="img" aria-labelledby="title desc">
  <title id="title">Streaming event contract</title>
  <desc id="desc">A chat stream should expose lifecycle, retrieval, token deltas, usage, completion, and error events rather than only text chunks.</desc>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M1 1 L11 6 L1 11 Z" fill="#334155"/></marker></defs>
  <rect width="1280" height="540" rx="28" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#0f172a">A useful stream is typed</text>
  <text x="70" y="110" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Send lifecycle, retrieval, token, usage, and terminal events with the same request id.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="80" y="210" width="145" height="86" rx="15" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="152" y="248" text-anchor="middle" font-size="21" font-weight="800" fill="#0f172a">started</text><text x="152" y="275" text-anchor="middle" font-size="14" fill="#64748b">request id</text>
    <rect x="275" y="210" width="160" height="86" rx="15" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/><text x="355" y="248" text-anchor="middle" font-size="21" font-weight="800" fill="#0f172a">retrieval</text><text x="355" y="275" text-anchor="middle" font-size="14" fill="#64748b">docs, scores</text>
    <rect x="485" y="210" width="160" height="86" rx="15" fill="#0f172a"/><text x="565" y="248" text-anchor="middle" font-size="21" font-weight="800" fill="#ffffff">delta</text><text x="565" y="275" text-anchor="middle" font-size="14" fill="#cbd5e1">token chunks</text>
    <rect x="695" y="210" width="160" height="86" rx="15" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/><text x="775" y="248" text-anchor="middle" font-size="21" font-weight="800" fill="#0f172a">tool</text><text x="775" y="275" text-anchor="middle" font-size="14" fill="#64748b">call status</text>
    <rect x="905" y="210" width="160" height="86" rx="15" fill="#ffffff" stroke="#fde68a" stroke-width="2"/><text x="985" y="248" text-anchor="middle" font-size="21" font-weight="800" fill="#0f172a">usage</text><text x="985" y="275" text-anchor="middle" font-size="14" fill="#64748b">tokens, cost</text>
    <rect x="1115" y="210" width="110" height="86" rx="15" fill="#ffffff" stroke="#fecaca" stroke-width="2"/><text x="1170" y="248" text-anchor="middle" font-size="21" font-weight="800" fill="#0f172a">done</text><text x="1170" y="275" text-anchor="middle" font-size="14" fill="#64748b">or error</text>
  </g>
  <path d="M227 253 H267" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/><path d="M437 253 H477" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/><path d="M647 253 H687" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/><path d="M857 253 H897" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/><path d="M1067 253 H1107" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="235" y="390" width="810" height="56" rx="14" fill="#0f172a"/>
  <text x="640" y="425" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" fill="#f8fafc">text-only streams hide the events operators need to debug failures</text>
</svg>
