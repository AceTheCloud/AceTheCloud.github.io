<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Human-in-the-loop workflow</title>
  <desc id="desc">A human-in-the-loop workflow routes LLM outputs by confidence and risk into automated completion, assisted review, human approval, and feedback capture.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1280" height="720" rx="28" fill="url(#bg)"/>
  <text x="70" y="80" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#0f172a">Human review is a workflow system</text>
  <text x="70" y="120" font-family="Inter, Arial, sans-serif" font-size="21" fill="#475569">Humans enter when risk, uncertainty, or accountability changes the outcome.</text>

  <rect x="90" y="240" width="190" height="100" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="185" y="281" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">LLM result</text>
  <text x="185" y="310" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">answer + evidence</text>

  <rect x="365" y="215" width="230" height="150" rx="20" fill="#0f172a"/>
  <text x="480" y="265" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="800" fill="#ffffff">Risk router</text>
  <text x="480" y="299" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#cbd5e1">confidence, policy, action risk</text>
  <text x="480" y="328" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="15" fill="#bbf7d0">route, do not guess</text>

  <path d="M282 290 H356" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="730" y="150" width="250" height="92" rx="18" fill="#ffffff" stroke="#bbf7d0" stroke-width="3"/>
    <text x="855" y="187" text-anchor="middle" font-size="24" font-weight="800" fill="#166534">Auto complete</text>
    <text x="855" y="215" text-anchor="middle" font-size="15" fill="#166534">low risk, high confidence</text>
    <rect x="730" y="285" width="250" height="92" rx="18" fill="#ffffff" stroke="#fde68a" stroke-width="3"/>
    <text x="855" y="322" text-anchor="middle" font-size="24" font-weight="800" fill="#92400e">Assisted review</text>
    <text x="855" y="350" text-anchor="middle" font-size="15" fill="#92400e">edit, approve, annotate</text>
    <rect x="730" y="420" width="250" height="92" rx="18" fill="#ffffff" stroke="#fecaca" stroke-width="3"/>
    <text x="855" y="457" text-anchor="middle" font-size="24" font-weight="800" fill="#991b1b">Human approval</text>
    <text x="855" y="485" text-anchor="middle" font-size="15" fill="#991b1b">high stakes or side effect</text>
  </g>

  <path d="M597 290 C655 250 670 195 720 195" stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M597 290 H720" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M597 290 C655 340 670 465 720 465" stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="230" y="520" width="820" height="72" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="640" y="565" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">Corrections become labeled data, eval cases, policy updates, and workflow fixes</text>
  <path d="M855 513 V555 H1060 V290 H990" stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <text x="640" y="650" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="19" fill="#334155">Do not build a slow inbox. Build queues, ownership, SLA, and feedback loops.</text>
</svg>
