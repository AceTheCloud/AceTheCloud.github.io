<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 540" role="img" aria-labelledby="title desc">
  <title id="title">KV cache pressure</title>
  <desc id="desc">KV cache pressure grows with active tokens, layers, KV heads, head dimension, precision, and concurrent sessions, making memory a central serving constraint.</desc>
  <rect width="1280" height="540" rx="28" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#0f172a">KV cache turns context into memory pressure</text>
  <text x="70" y="110" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Longer sessions consume HBM even when compute still looks available.</text>
  <rect x="95" y="180" width="470" height="220" rx="22" fill="#0f172a"/>
  <text x="330" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="800" fill="#ffffff">KV memory grows with</text>
  <g font-family="Inter, Arial, sans-serif" font-size="18" fill="#cbd5e1">
    <text x="145" y="282">tokens x layers x kv_heads x head_dim</text>
    <text x="145" y="320">x 2 tensors x bytes x active sessions</text>
    <text x="145" y="360">plus fragmentation and allocation overhead</text>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="650" y="170" width="150" height="260" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="675" y="360" width="100" height="45" rx="8" fill="#bbf7d0"/><rect x="675" y="305" width="100" height="45" rx="8" fill="#93c5fd"/><rect x="675" y="250" width="100" height="45" rx="8" fill="#fde68a"/><rect x="675" y="195" width="100" height="45" rx="8" fill="#fecaca"/>
    <text x="725" y="462" text-anchor="middle" font-size="18" font-weight="800" fill="#0f172a">HBM</text>
    <rect x="860" y="170" width="320" height="260" rx="18" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
    <text x="1020" y="220" text-anchor="middle" font-size="25" font-weight="800" fill="#0f172a">Paged allocation</text>
    <text x="1020" y="255" text-anchor="middle" font-size="17" fill="#475569">smaller blocks reduce waste</text>
    <text x="1020" y="292" text-anchor="middle" font-size="17" fill="#475569">prefix reuse reduces prefill</text>
    <text x="1020" y="329" text-anchor="middle" font-size="17" fill="#475569">eviction policy protects hot state</text>
  </g>
  <text x="640" y="488" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" fill="#334155">Scale on queue depth and KV pressure, not just raw GPU utilization.</text>
</svg>
