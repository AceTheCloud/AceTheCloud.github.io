<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">End-to-end LLM application architecture</title>
  <desc id="desc">A production LLM request flows through gateway, conversation state, orchestration, retrieval, tools, model gateway, inference, streaming, and telemetry.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#edf7f3"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" x2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1280" height="720" rx="28" fill="url(#bg)"/>
  <circle cx="1130" cy="120" r="120" fill="#22c55e" opacity=".10"/>
  <circle cx="130" cy="610" r="160" fill="#2563eb" opacity=".10"/>

  <text x="70" y="80" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#0f172a">Production LLM request path</text>
  <text x="70" y="120" font-family="Inter, Arial, sans-serif" font-size="21" fill="#475569">The model is one box. The product is the system around it.</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="70" y="185" width="160" height="92" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="150" y="225" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Client</text>
    <text x="150" y="253" text-anchor="middle" font-size="15" fill="#64748b">chat, API, app</text>

    <rect x="280" y="185" width="190" height="92" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="375" y="222" text-anchor="middle" font-size="23" font-weight="800" fill="#0f172a">API Gateway</text>
    <text x="375" y="251" text-anchor="middle" font-size="15" fill="#64748b">auth, quota, idempotency</text>

    <rect x="520" y="175" width="220" height="112" rx="18" fill="url(#dark)"/>
    <text x="630" y="218" text-anchor="middle" font-size="25" font-weight="800" fill="#ffffff">Orchestrator</text>
    <text x="630" y="249" text-anchor="middle" font-size="16" fill="#cbd5e1">prompt, policy, route</text>

    <rect x="790" y="185" width="190" height="92" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="885" y="222" text-anchor="middle" font-size="23" font-weight="800" fill="#0f172a">LLM Gateway</text>
    <text x="885" y="251" text-anchor="middle" font-size="15" fill="#64748b">fallback, cost, provider</text>

    <rect x="1030" y="185" width="180" height="92" rx="16" fill="#ffffff" stroke="#76B900" stroke-width="3"/>
    <text x="1120" y="222" text-anchor="middle" font-size="23" font-weight="800" fill="#0f172a">Inference</text>
    <text x="1120" y="251" text-anchor="middle" font-size="15" fill="#64748b">hosted or self-served</text>
  </g>

  <path d="M232 231 H272" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M472 231 H512" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M742 231 H782" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M982 231 H1022" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="230" y="390" width="210" height="125" rx="18" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
    <text x="335" y="436" text-anchor="middle" font-size="25" font-weight="800" fill="#0f172a">Conversation</text>
    <text x="335" y="466" text-anchor="middle" font-size="16" fill="#475569">history, summary, state</text>
    <text x="335" y="493" text-anchor="middle" font-size="15" fill="#64748b">tenant-scoped sessions</text>

    <rect x="535" y="390" width="190" height="125" rx="18" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <text x="630" y="436" text-anchor="middle" font-size="25" font-weight="800" fill="#0f172a">Retrieval</text>
    <text x="630" y="466" text-anchor="middle" font-size="16" fill="#475569">hybrid search</text>
    <text x="630" y="493" text-anchor="middle" font-size="15" fill="#64748b">rerank, pack context</text>

    <rect x="820" y="390" width="190" height="125" rx="18" fill="#ffffff" stroke="#fde68a" stroke-width="2"/>
    <text x="915" y="436" text-anchor="middle" font-size="25" font-weight="800" fill="#0f172a">Tools</text>
    <text x="915" y="466" text-anchor="middle" font-size="16" fill="#475569">schemas, RBAC</text>
    <text x="915" y="493" text-anchor="middle" font-size="15" fill="#64748b">safe side effects</text>
  </g>

  <path d="M630 288 V382" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M520 430 H449" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M741 430 H811" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M915 390 V310 H1120 V286" stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="170" y="585" width="940" height="58" rx="14" fill="#0f172a"/>
  <text x="640" y="622" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="19" fill="#f8fafc">stream events + traces + cost + quality signals for every request</text>
</svg>
