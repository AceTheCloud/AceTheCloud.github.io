<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent hints flow through Dynamo</title>
  <desc id="desc">Agentic hints move from the agent harness through nvext to frontend, router, and backend scheduling.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1280" height="720" rx="28" fill="url(#bg)"/>
  <text x="72" y="80" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#0f172a">Agents know things the router should hear</text>
  <text x="72" y="122" font-family="Inter, Arial, sans-serif" font-size="21" fill="#475569">Hints turn an opaque request into a schedulable unit of work.</text>

  <rect x="75" y="225" width="210" height="125" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="129" y="276" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a">Agent</text>
  <text x="110" y="312" font-family="JetBrains Mono, monospace" font-size="17" fill="#475569">plan, tools, turn</text>

  <path d="M288 288 H398" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="395" y="205" width="320" height="165" rx="20" fill="#0f172a"/>
  <text x="430" y="258" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#ffffff">nvext.agent_hints</text>
  <text x="458" y="300" font-family="JetBrains Mono, monospace" font-size="17" fill="#bbf7d0">priority</text>
  <text x="458" y="330" font-family="JetBrains Mono, monospace" font-size="17" fill="#bbf7d0">expected OSL</text>
  <text x="458" y="360" font-family="JetBrains Mono, monospace" font-size="17" fill="#bbf7d0">speculative prefill</text>

  <path d="M718 288 H775" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="795" y="225" width="185" height="125" rx="18" fill="#ffffff" stroke="#76B900" stroke-width="3"/>
  <text x="836" y="276" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a">Router</text>
  <text x="831" y="312" font-family="JetBrains Mono, monospace" font-size="17" fill="#166534">queue + route</text>

  <path d="M984 288 H1090" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="1105" y="225" width="140" height="125" rx="18" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="1130" y="276" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a">Engine</text>
  <text x="1132" y="312" font-family="JetBrains Mono, monospace" font-size="17" fill="#1e3a8a">schedule</text>

  <rect x="186" y="480" width="908" height="96" rx="18" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
  <text x="240" y="525" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">Useful outcomes</text>
  <text x="462" y="515" font-family="JetBrains Mono, monospace" font-size="18" fill="#475569">user turns beat background work</text>
  <text x="462" y="545" font-family="JetBrains Mono, monospace" font-size="18" fill="#475569">cache warms earlier; eviction gets smarter</text>

  <rect x="315" y="625" width="650" height="48" rx="12" fill="#111827"/>
  <text x="374" y="656" font-family="Inter, Arial, sans-serif" font-size="20" fill="#f8fafc">Do not make the runtime guess what agents know.</text>
</svg>
